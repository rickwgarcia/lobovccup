<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lobo VC Cup 2026 — UNM's Startup Investment Competition</title>
  <meta name="description" content="The University of New Mexico's premier startup investment competition. Student VCs pitch for real capital, deploy it into student-founded startups." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles/main.css" />
</head>
<body class="hero-page">

<!-- ── Navigation ──────────────────────────────────────── -->
<div id="nav-root" data-page="home" data-hero="true" data-base=""></div>
<script src="assets/js/nav.js"></script>

<!-- ── Hero ─────────────────────────────────────────────── -->
<section class="hero">
  <canvas class="hero__canvas" id="hero-canvas"></canvas>
  <div class="hero__overlay"></div>
  <div class="container">
    <div class="hero__content fade-in-up">
      <div id="content-hero"></div>

<div id="content-hero-stats"></div>
    </div>
  </div>
</section>

<!-- ── About ─────────────────────────────────────────────── -->
<section class="section" id="about">
  <div class="container">
    <div id="content-home" class="content-body">
      <!-- Loaded from /api/content/home -->
      <div style="text-align:center; padding: 60px 0; color: rgba(44,24,16,0.35);">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
</section>

<!-- ── Schedule ───────────────────────────────────────────── -->
<section class="section" id="schedule">
  <div class="container">
    <div id="content-schedule">
      <div style="text-align:center; padding: 60px 0; color: rgba(44,24,16,0.35);"><div class="spinner"></div></div>
    </div>
  </div>
</section>

<!-- ── CTA ─────────────────────────────────────────────────── -->
<section class="section" style="background: linear-gradient(135deg, rgba(192,57,43,0.07) 0%, rgba(192,57,43,0.02) 100%); border-top: 1px solid rgba(192,57,43,0.16); border-bottom: 1px solid rgba(192,57,43,0.16);">
  <div class="container" style="text-align:center;">
    <div id="content-cta">
      <div style="text-align:center; padding: 40px 0; color: rgba(44,24,16,0.35);"><div class="spinner"></div></div>
    </div>
  </div>
</section>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">
  <div class="container">
    <div class="footer__grid">
      <div class="footer__brand">
        <div class="footer__logo">LOBO <span>VC</span> CUP</div>
        <p class="footer__tagline">Student founders pitch. Student VCs invest.<br />University of New Mexico</p>
      </div>
      <div>
        <div class="footer__col-title">Competition</div>
        <div class="footer__links">
          <a href="#schedule">Schedule</a>
        </div>
      </div>
      <div>
        <div class="footer__col-title">Contact</div>
        <div class="footer__links">
          <a href="mailto:lobovccup@unmm.onmicrosoft.com">Lobo VC Cup</a>
        </div>
      </div>
    </div>
    <div class="footer__bottom">
      <span class="footer__copy">Lobo VC Cup</span>
      <span class="footer__unm">UNM</span>
    </div>
  </div>
</footer>

<script>
  const API = '/api';

  // ── Hero canvas particle grid
  (function () {
    const canvas = document.getElementById('hero-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
      initParticles();
    }

    function initParticles() {
      particles = [];
      const count = Math.floor((W * H) / 12000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 1.5 + 0.5,
          alpha: Math.random() * 0.4 + 0.1,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Grid lines
      ctx.strokeStyle = 'rgba(192,57,43,0.05)';
      ctx.lineWidth = 1;
      const gridSize = 80;
      for (let x = 0; x < W; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Particles + connections
      particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(243,156,18,${p.alpha})`;
        ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dist = Math.hypot(p.x - q.x, p.y - q.y);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `rgba(243,156,18,${0.06 * (1 - dist / 120)})`;
            ctx.stroke();
          }
        }
      });

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  })();

  // ── Load home content from API
  async function loadContent(page, targetId) {
    try {
      const res = await fetch(`${API}/content/${page}`);
      const { html } = await res.json();
      document.getElementById(targetId).innerHTML = html;
    } catch {
      document.getElementById(targetId).innerHTML =
        '<p style="color:rgba(44,24,16,0.42)">Content unavailable — check back soon.</p>';
    }
  }
  loadContent('hero',       'content-hero');
  loadContent('hero-stats', 'content-hero-stats');
  loadContent('home',     'content-home');
  loadContent('schedule', 'content-schedule');
  loadContent('cta',      'content-cta');


</script>
</body>
</html>
