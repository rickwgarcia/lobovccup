<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Login — Lobo VC Cup 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cherry: #c0392b;
      --cherry-dark: #922b21;
      --sand: #f5f0e8;
      --ink: #1a1a1a;
      --muted: #666;
      --border: #ddd;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sand);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .back {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
    }
    .back:hover { color: var(--cherry); }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }
    .sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      color: var(--ink);
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: #fff;
      color: var(--ink);
      outline: none;
      margin-bottom: 1.25rem;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--cherry); }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--cherry);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--cherry-dark); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }
    .msg.error { color: var(--cherry); }
    .msg.success { color: #1a7a4a; }
    .toggle {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .toggle a { color: var(--cherry); cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <a href="index.html" class="back">← Back to home</a>
    <h1 id="form-title">Team Login</h1>
    <p class="sub" id="form-sub">Sign in with your UNM email to submit materials.</p>

    <div id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@unm.edu" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <button class="btn" id="login-btn" onclick="handleLogin()">Sign In</button>
      <p class="msg" id="login-msg"></p>
      <p class="toggle">No account? <a onclick="showSignup()">Create one</a></p>
    </div>

    <div id="signup-form" style="display:none">
      <label for="su-email">Email</label>
      <input type="email" id="su-email" placeholder="you@unm.edu" />

      <label for="su-password">Password</label>
      <input type="password" id="su-password" placeholder="Min 6 characters" />

      <button class="btn" id="signup-btn" onclick="handleSignup()">Create Account</button>
      <p class="msg" id="signup-msg"></p>
      <p class="toggle">Already have an account? <a onclick="showLogin()">Sign in</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script>
    _initSupabase()

    // Redirect if already logged in
    window._sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'submit.html'
    })

    window.handleLogin = async () => {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const msg = document.getElementById('login-msg')
      const btn = document.getElementById('login-btn')

      if (!email || !password) { msg.className = 'msg error'; msg.textContent = 'Please fill in all fields.'; return }

      btn.disabled = true; btn.textContent = 'Signing in...'
      const { error } = await window._sb.auth.signInWithPassword({ email, password })
      btn.disabled = false; btn.textContent = 'Sign In'

      if (error) { msg.className = 'msg error'; msg.textContent = error.message }
      else window.location.href = 'submit.html'
    }

    window.handleSignup = async () => {
      const email = document.getElementById('su-email').value.trim()
      const password = document.getElementById('su-password').value
      const msg = document.getElementById('signup-msg')
      const btn = document.getElementById('signup-btn')

      if (!email || !password) { msg.className = 'msg error'; msg.textContent = 'Please fill in all fields.'; return }

      btn.disabled = true; btn.textContent = 'Creating account...'
      const { error } = await window._sb.auth.signUp({ email, password })
      btn.disabled = false; btn.textContent = 'Create Account'

      if (error) { msg.className = 'msg error'; msg.textContent = error.message }
      else { msg.className = 'msg success'; msg.textContent = 'Account created! Check your email to confirm, then sign in.' }
    }

    window.showSignup = () => {
      document.getElementById('login-form').style.display = 'none'
      document.getElementById('signup-form').style.display = 'block'
      document.getElementById('form-title').textContent = 'Create Account'
      document.getElementById('form-sub').textContent = 'Register with your UNM email.'
    }

    window.showLogin = () => {
      document.getElementById('signup-form').style.display = 'none'
      document.getElementById('login-form').style.display = 'block'
      document.getElementById('form-title').textContent = 'Team Login'
      document.getElementById('form-sub').textContent = 'Sign in with your UNM email to submit materials.'
    }
  </script>

</body>
</html>
